<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinister H-Town RP — Loading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-bg" id="videoBackground">
        <div class="no-video-fallback"></div>
    </div>

    <div class="overlay"></div>

    <canvas class="particle-canvas" id="particleCanvas"></canvas>

    <div class="lone-star">&#9733;</div>

    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <div class="watermark">SINISTER H-TOWN RP</div>

    <audio id="bgMusic" loop preload="auto">
        <source src="media/bg.webm" type="audio/webm">
    </audio>

    <div class="loading-card" id="loadingCard">
        <div class="logo" id="logoContainer">
            <img class="logo-img" id="logoImage" src="media/logo.png" alt="Sinister Logo" onerror="this.style.display='none'">
            <h1 class="logo-primary">SINISTER</h1>
            <h2 class="logo-accent">H-TOWN</h2>
            <p class="logo-subtext">Roleplay · Texas</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-row">
                <span class="progress-label" id="progressLabel">Connecting...</span>
                <span class="progress-text" id="progressPercent">0%</span>
            </div>
        </div>

        <div class="loading-info">
            <span class="loading-message" id="loadingMessage">Loading Lone Star State...</span>
            <span class="loading-dots">
                <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </span>
        </div>

        <div class="status" id="statusText">
            Sinister H-Town RP — Live
        </div>

        <div class="card-footer" id="cardFooter">
            <span class="footer-text">darkside-devs.tebex.io</span>
        </div>
    </div>

    <div class="rules-section" id="rulesSection">
        <div class="rules-header">Server Rules</div>
        <div class="rules-carousel" id="rulesCarousel"></div>
        <div class="rules-counter" id="rulesCounter"></div>
    </div>

    <div class="updates-section" id="updatesSection">
        <div class="updates-header">
            <span class="updates-icon">&#9733;</span>
            Latest Updates
        </div>
        <div class="updates-ticker" id="updatesTicker"></div>
    </div>

    <button class="music-btn" id="musicToggle" title="Toggle Music" aria-label="Toggle background music">
        <span class="music-icon" id="musicIcon">&#9835;</span>
    </button>

    <script src="config.js"></script>
    <script src="background.js"></script>
    <script>
        (function () {
            var bgMusic = document.getElementById('bgMusic');
            var musicBtn = document.getElementById('musicToggle');
            var musicIcon = document.getElementById('musicIcon');
            var progressFill = document.getElementById('progressFill');
            var progressPercent = document.getElementById('progressPercent');
            var progressLabel = document.getElementById('progressLabel');
            var loadingMessage = document.getElementById('loadingMessage');
            var rulesCarousel = document.getElementById('rulesCarousel');
            var rulesCounter = document.getElementById('rulesCounter');
            var updatesTicker = document.getElementById('updatesTicker');
            var statusText = document.getElementById('statusText');
            var cardFooter = document.getElementById('cardFooter');
            var isPlaying = false;
            var audioFailed = false;

            statusText.textContent = CONFIG.statusText || 'Sinister H-Town RP — Live';

            if (CONFIG.logoBrandPrimary) {
                document.querySelector('.logo-primary').textContent = CONFIG.logoBrandPrimary;
            }
            if (CONFIG.logoBrandAccent) {
                document.querySelector('.logo-accent').textContent = CONFIG.logoBrandAccent;
            }
            if (CONFIG.logoSubtext) {
                document.querySelector('.logo-subtext').textContent = CONFIG.logoSubtext;
            }

            bgMusic.volume = (CONFIG.defaultVolume || 60) / 100;

            if (bgMusic && bgMusic.canPlayType && bgMusic.canPlayType('audio/webm')) {
                var playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(function () {
                        isPlaying = true;
                        musicIcon.innerHTML = '&#9835;';
                        musicBtn.classList.remove('muted');
                    }).catch(function () {
                        isPlaying = false;
                        audioFailed = true;
                        musicIcon.innerHTML = '&#9835;';
                        musicBtn.classList.add('muted');
                    });
                }
            } else {
                audioFailed = true;
                musicBtn.classList.add('muted');
            }

            musicBtn.addEventListener('click', function () {
                if (audioFailed && !isPlaying) {
                    bgMusic.play().then(function () {
                        isPlaying = true;
                        audioFailed = false;
                        musicIcon.innerHTML = '&#9835;';
                        musicBtn.classList.remove('muted');
                    }).catch(function () {});
                    return;
                }
                if (isPlaying) {
                    bgMusic.pause();
                    musicIcon.innerHTML = '&#9835;';
                    musicBtn.classList.add('muted');
                    isPlaying = false;
                } else {
                    var playP = bgMusic.play();
                    if (playP !== undefined) {
                        playP.then(function () {
                            isPlaying = true;
                            musicIcon.innerHTML = '&#9835;';
                            musicBtn.classList.remove('muted');
                        }).catch(function () {
                            isPlaying = false;
                            musicIcon.innerHTML = '&#9835;';
                            musicBtn.classList.add('muted');
                        });
                    } else {
                        isPlaying = true;
                        musicIcon.innerHTML = '&#9835;';
                        musicBtn.classList.remove('muted');
                    }
                }
            });

            if (CONFIG.backgroundVideo) {
                var vidContainer = document.getElementById('videoBackground');
                var fallback = vidContainer.querySelector('.no-video-fallback');
                if (fallback) { fallback.style.display = 'none'; }
                var vid = document.createElement('video');
                vid.src = CONFIG.backgroundVideo;
                vid.autoplay = true;
                vid.muted = true;
                vid.loop = true;
                vid.playsInline = true;
                vid.setAttribute('playsinline', '');
                vid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
                vidContainer.appendChild(vid);
            }

            var lastPercent = 0;
            var messageIndex = 0;
            var messageTimer = 0;

            function simulateProgress() {
                if (lastPercent < 90) {
                    var increment = Math.random() * 0.8;
                    if (lastPercent > 70) { increment *= 0.5; }
                    if (lastPercent > 80) { increment *= 0.3; }
                    lastPercent += increment;
                    if (lastPercent > 90) { lastPercent = 90; }
                }
                var pct = Math.floor(lastPercent);
                progressFill.style.width = pct + '%';
                progressPercent.textContent = pct + '%';

                if (pct < 20) {
                    progressLabel.textContent = 'Connecting...';
                } else if (pct < 50) {
                    progressLabel.textContent = 'Loading Assets...';
                } else if (pct < 80) {
                    progressLabel.textContent = 'Preparing World...';
                } else if (pct < 95) {
                    progressLabel.textContent = 'Almost Ready...';
                } else {
                    progressLabel.textContent = 'Ready!';
                }

                if (CONFIG.loadingMessages && CONFIG.loadingMessages.length > 0) {
                    messageTimer++;
                    if (messageTimer > 25) {
                        messageTimer = 0;
                        messageIndex = (messageIndex + 1) % CONFIG.loadingMessages.length;
                        var msg = CONFIG.loadingMessages[messageIndex];
                        loadingMessage.classList.add('fade');
                        setTimeout(function () {
                            loadingMessage.textContent = msg;
                            loadingMessage.classList.remove('fade');
                        }, 150);
                    }
                }
            }
            setInterval(simulateProgress, 120);

            window.addEventListener('message', function (event) {
                var data = event.data;
                if (!data) { return; }
                if (typeof data.progress !== 'undefined') {
                    lastPercent = Number(data.progress);
                    if (lastPercent > 100) { lastPercent = 100; }
                    if (lastPercent < 0) { lastPercent = 0; }
                    if (lastPercent >= 100) {
                        progressLabel.textContent = 'Complete!';
                        progressPercent.classList.add('done');
                    }
                }
                if (data.loadingMessage) {
                    loadingMessage.textContent = data.loadingMessage;
                }
                if (data.statusText) {
                    statusText.textContent = data.statusText;
                }
            });

            if (CONFIG.rules && CONFIG.rules.length > 0) {
                var currentRule = 0;
                var totalRules = CONFIG.rules.length;
                rulesCounter.textContent = '1 / ' + totalRules;

                function renderRule() {
                    rulesCarousel.classList.add('fade-out');
                    setTimeout(function () {
                        rulesCarousel.textContent = CONFIG.rules[currentRule];
                        rulesCounter.textContent = (currentRule + 1) + ' / ' + totalRules;
                        rulesCarousel.classList.remove('fade-out');
                        rulesCarousel.style.animation = 'none';
                        rulesCarousel.offsetHeight;
                        rulesCarousel.style.animation = 'fadeIn 0.6s ease forwards';
                    }, 300);
                    currentRule = (currentRule + 1) % totalRules;
                }
                renderRule();
                setInterval(renderRule, 5000);
            }

            if (CONFIG.updates && CONFIG.updates.length > 0) {
                var tickerParts = [];
                for (var u = 0; u < CONFIG.updates.length; u++) {
                    var update = CONFIG.updates[u];
                    tickerParts.push(
                        '<span class="update-bullet">&bull;</span> ' +
                        '<strong>' + update.title + '</strong>: ' +
                        update.desc +
                        ' <span class="update-date">(' + update.date + ')</span>'
                    );
                }
                var separator = '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';
                var tickerContent = tickerParts.join(separator);
                var doubled = tickerContent + separator + tickerContent;
                updatesTicker.innerHTML = doubled;
            }

            document.addEventListener('keydown', function (e) {
                if (e.key === 'm' || e.key === 'M') {
                    e.preventDefault();
                    musicBtn.click();
                }
            });

            setTimeout(function () {
                if (cardFooter) {
                    cardFooter.style.opacity = '0.6';
                    cardFooter.style.transition = 'opacity 1s ease';
                }
            }, 3000);
        })();
    </script>

</body>
</html>
