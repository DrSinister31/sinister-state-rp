<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinister Apps</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="phone-frame">
    <div class="phone-status">
        <span class="time" id="phone-time">12:00</span>
        <span class="icons">📶 🔋</span>
    </div>

    <!-- HOME -->
    <div id="home" class="screen active">
        <div class="app-header">
            <span class="title">Sinister Apps</span>
        </div>
        <div class="app-grid">
            <div class="app-icon" onclick="openApp('banking')">
                <span class="icon">🏦</span><span class="label">Business Bank</span></div>
            <div class="app-icon" onclick="openApp('browser')">
                <span class="icon">🌐</span><span class="label">TX Browser</span></div>
            <div class="app-icon" onclick="openApp('syntok')">
                <span class="icon">📱</span><span class="label">syntok</span></div>
        </div>
    </div>

    <!-- BANKING -->
    <div id="banking-frame" class="app-frame">
        <div class="app-header">
            <button class="back-btn" onclick="closeApp()">←</button>
            <span class="title">Business Banking</span>
        </div>
        <div class="app-content" id="banking-content">
            <div class="loading-text" id="biz-loading">Loading your businesses...</div>
        </div>
    </div>

    <!-- BROWSER -->
    <div id="browser-frame" class="app-frame">
        <div class="app-header">
            <button class="back-btn" onclick="closeApp()">←</button>
            <span class="title">TX Browser</span>
        </div>
        <div class="app-content">
            <div class="browser-bar">
                <input type="text" placeholder="Search Sinister State..." id="browser-search" onkeydown="if(event.key==='Enter')searchBrowser()">
                <button onclick="searchBrowser()">Go</button>
            </div>
            <div id="browser-results"></div>
        </div>
    </div>

    <!-- SYNTOK -->
    <div id="syntok-frame" class="app-frame">
        <div class="app-header">
            <button class="back-btn" onclick="closeApp()">←</button>
            <span class="title">syntok</span>
        </div>
        <div class="app-content" id="syntok-content">
            <div class="loading-text">Loading chronicles...</div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
