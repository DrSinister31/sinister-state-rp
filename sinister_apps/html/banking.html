<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head><body class="app-page">
<div class="app-header">🏦 Business Banking</div>
<div id="biz-loading">Loading your businesses...</div>
<div id="biz-content" style="display:none">
    <div id="biz-balance" class="balance-card"></div>
    <div class="tab-bar">
        <button class="tab active" onclick="bizTab('recent')">Recent</button>
        <button class="tab" onclick="bizTab('payroll')">Payroll</button>
        <button class="tab" onclick="bizTab('pnl')">P&L</button>
    </div>
    <div id="biz-recent" class="tab-content active"></div>
    <div id="biz-payroll" class="tab-content"></div>
    <div id="biz-pnl" class="tab-content"></div>
</div>
<script>
const SUPABASE_URL = 'https://yqfzaugbrwoluhkddcsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZnphdWdicndvbHVoa2RkY3NoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzEwMTE1MSwiZXhwIjoyMDk4Njc3MTUxfQ.cEVcfQnn3jBCeGKxASH7rP3--gl_KefEiktXQeNCZsc';
let bizData = [];

async function loadBiz(citizenid) {
    try {
        let r = await fetch(`${SUPABASE_URL}/rest/v1/businesses?select=*&owner_citizenid=eq.${citizenid}&active=eq.true`,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
        bizData = await r.json();
        document.getElementById('biz-loading').style.display='none';
        if (!bizData.length) { document.getElementById('biz-content').innerHTML = '<p>No active businesses. Buy one at City Hall!</p>'; document.getElementById('biz-content').style.display='block'; return; }
        let html = '<select id="biz-select" onchange="showBiz()">';
        bizData.forEach((b,i) => html += `<option value="${i}">${b.name}</option>`);
        html += '</select>';
        document.getElementById('biz-balance').innerHTML = html;
        document.getElementById('biz-content').style.display='block';
        showBiz();
    } catch(e) { document.getElementById('biz-loading').textContent='Error loading businesses'; }
}

function showBiz() {
    let idx = document.getElementById('biz-select').value;
    let b = bizData[idx];
    let txs = `<h3>${b.name}</h3><p>💵 Bank: $${(b.bank_account||0).toLocaleString()}</p><p>📊 Revenue: $${(b.revenue||0).toLocaleString()}</p>`;
    document.getElementById('biz-balance').innerHTML = txs;
}

function bizTab(t) { document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active')); event.target.classList.add('active'); document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active')); document.getElementById('biz-'+t).classList.add('active'); }

window.addEventListener('message', e => { if (e.data.type === 'loadBusinessBanking') loadBiz(e.data.citizenid); });
</script>
</body></html>
