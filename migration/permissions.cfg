# ============================================================================
# Sinister H-Town RP — ACE Permissions
# ============================================================================

# Grant qbx_core ability to manage ACEs (kills add_ace Access denied warnings)
add_ace resource.qbx_core command.add_ace allow
add_ace resource.qbx_core command.add_principal allow
add_ace resource.qbx_core command.set allow

# Grant ox resources access
add_ace resource.ox_inventory command.add_ace allow
add_ace resource.ox_inventory command.set allow

# Admin group — all permissions
add_ace group.admin command allow
add_ace group.admin txadmin.menu allow

# Moderator group
add_ace group.moderator command.kick allow
add_ace group.moderator command.ban allow
add_ace group.moderator command.mute allow

# Inheritance: admin inherits moderator
add_principal group.admin group.moderator

# Owner — Discord ID
add_principal identifier.discord:1370770707507708047 group.admin
