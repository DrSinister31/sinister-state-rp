[build]
builder = "nixpacks"
buildCommand = "pip install -r Kronus/requirements.txt"
aptPackages = ["ffmpeg", "mpv"]

[deploy]
startCommand = "PYTHONPATH=Kronus python Kronus/kronus_core/main.py"

[service]
name = "kronus-core"

[variables]
DM_MODE = "1"
DM_WHISPER_ENABLED = "1"
DM_WHISPER_MODEL = "tiny.en"
# WHISPER_SERVER_URL = "http://localhost:8787"  # Uncomment if running separate whisper server
