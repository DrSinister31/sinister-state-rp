<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinister State TX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="film-strip top"></div>
<div class="film-strip bottom"></div>

<div class="scene">
    <div class="glow"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="content" id="content">
        <div class="logo-wrap">
            <img src="assets/logo.svg" alt="Sinister State" id="logo">
            <div class="tagline">SINISTER STATE &bull; TEXAS</div>
            <div class="cities">HOUSTON &bull; FORT WORTH &bull; KILLEEN</div>
        </div>
        <div class="divider"></div>
        <div class="status-text" id="status">Entering the State of Texas</div>
    </div>
</div>

<audio id="soundtrack" loop>
    <source src="assets/ambient.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
