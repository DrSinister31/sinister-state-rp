<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinister State TX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="film-strip top"></div>
<div class="film-strip bottom"></div>

<iframe id="bg-video"
    src=""
    frameborder="0"
    allow="autoplay"
    style="display:none">
</iframe>

<canvas id="particles"></canvas>

<div class="scene"></div>
<div class="dust-layer"></div>
<div class="headlights"></div>

<div class="logo-wrap">
    <img src="assets/logo.png" alt="Sinister State TX" id="logo">
</div>

<div class="status-text" id="status">Entering the State of Texas</div>

<audio id="soundtrack" loop>
    <source src="assets/ambient.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
