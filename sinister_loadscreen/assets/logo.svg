<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF5700"/>
      <stop offset="40%" stop-color="#D2691E"/>
      <stop offset="100%" stop-color="#694943"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#694943"/>
      <stop offset="100%" stop-color="#3f211f"/>
    </linearGradient>
    <linearGradient id="texasFlagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BF0A30"/>
      <stop offset="100%" stop-color="#7a051c"/>
    </linearGradient>
  </defs>

  <!-- Background dark -->
  <rect width="800" height="400" fill="#0d0c0a"/>

  <!-- Subtle Texas outline -->
  <path d="M180 120 L620 120 L640 160 L660 180 L660 220 L640 250 L620 280 L180 280 L140 250 L120 200 L140 160 Z"
        fill="none" stroke="rgba(105,73,67,0.15)" stroke-width="1"/>
  
  <!-- Star core -->
  <polygon points="400,140 418,190 470,192 430,225 444,275 400,252 356,275 370,225 330,192 382,190"
           fill="none" stroke="#694943" stroke-width="1" opacity="0.4"/>

  <!-- SINISTER -->
  <text x="400" y="200" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="82" font-weight="bold" letter-spacing="18"
        fill="url(#brandGrad)" filter="url(#strongGlow)"
        opacity="0.95">SINISTER</text>

  <!-- Underline -->
  <rect x="180" y="218" width="440" height="2" fill="url(#brandGrad)"
        filter="url(#glow)" opacity="0.6"/>

  <!-- STATE -->
  <text x="400" y="262" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40" font-weight="normal" letter-spacing="22"
        fill="url(#brandGrad)" filter="url(#glow)"
        opacity="0.7">STATE</text>

  <!-- TEXAS badge -->
  <rect x="320" y="285" width="160" height="32" rx="3"
        fill="none" stroke="#BF5700" stroke-width="1" opacity="0.5"/>
  <text x="400" y="308" text-anchor="middle"
        font-family="Georgia, serif" font-size="16" letter-spacing="10"
        fill="url(#brandGrad)" filter="url(#glow)"
        opacity="0.6">TEXAS RP</text>

  <!-- Lone star accent -->
  <polygon points="400,344 407,360 424,362 412,374 415,392 400,383 385,392 388,374 376,362 393,360"
           fill="#BF5700" filter="url(#glow)" opacity="0.5"/>

  <!-- Bottom cities -->
  <text x="400" y="385" text-anchor="middle"
        font-family="Georgia, serif" font-size="10" letter-spacing="5"
        fill="rgba(245,235,220,0.2)"
        opacity="0.5">HOUSTON    FORT WORTH    KILLEEN</text>
</svg>
