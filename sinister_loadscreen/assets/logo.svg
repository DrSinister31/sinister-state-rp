<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="420" fill="#0d0c0a"/>

  <!-- ===== TEXAS FLAG (visible, muted for cinema) ===== -->

  <!-- Blue canton (vertical 1/3 left side) -->
  <rect x="0" y="0" width="200" height="420" fill="#002868" opacity="0.85"/>

  <!-- White upper stripe -->
  <rect x="200" y="0" width="600" height="210" fill="#d4d0ca" opacity="0.18"/>

  <!-- Red lower stripe -->
  <rect x="200" y="210" width="600" height="210" fill="#BF0A30" opacity="0.22"/>

  <!-- Texas lone star in the blue canton -->
  <polygon points="100,100 118,150 172,152 128,186 143,238 100,204 57,238 72,186 28,152 82,150"
           fill="#FFFFFF" opacity="0.50" filter="url(#glow)"/>

  <!-- ===== HOUSTON CITY FLAG REFERENCE ===== -->
  
  <!-- Navy horizontal bar across the middle -->
  <rect x="0" y="248" width="800" height="44" fill="#001a4d" opacity="0.75"/>

  <!-- Twin Houston stars -->
  <polygon points="80,270 84,276 92,276 86,280 88,288 80,283 72,288 74,280 68,276 76,276"
           fill="#FFFFFF" opacity="0.55"/>
  <polygon points="720,270 724,276 732,276 726,280 728,288 720,283 712,288 714,280 708,276 716,276"
           fill="#FFFFFF" opacity="0.55"/>

  <!-- ===== BRAND TEXT ===== -->

  <text x="500" y="168" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="bold" letter-spacing="18"
        fill="#d4d0ca" filter="url(#strongGlow)"
        opacity="0.92">SINISTER</text>

  <rect x="340" y="186" width="320" height="2" fill="#d4d0ca" opacity="0.35" filter="url(#glow)"/>

  <text x="500" y="226" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="normal" letter-spacing="24"
        fill="#d4d0ca" opacity="0.65" filter="url(#glow)">STATE</text>

  <!-- TEXAS ROLEPLAY in Houston bar -->
  <text x="400" y="282" text-anchor="middle"
        font-family="Georgia, serif" font-size="14" letter-spacing="10"
        fill="#d4d0ca" opacity="0.75">TEXAS ROLEPLAY</text>

  <!-- Divider -->
  <rect x="300" y="308" width="400" height="1" fill="#d4d0ca" opacity="0.12"/>

  <!-- Cities -->
  <text x="400" y="338" text-anchor="middle"
        font-family="Georgia, serif" font-size="10" letter-spacing="4"
        fill="rgba(212,208,202,0.28)">HOUSTON  &bull;  FORT WORTH  &bull;  KILLEEN</text>

  <!-- Bottom Texas red bar -->
  <rect x="0" y="405" width="800" height="15" fill="#BF0A30" opacity="0.25"/>
</svg>
