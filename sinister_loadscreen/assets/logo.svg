<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vignette" x1="0.5" y1="0.5" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Texas flag full-bleed -->
  <rect width="1000" height="600" fill="#0d0c0a"/>

  <!-- Blue canton (1/3 left) -->
  <rect x="0" y="0" width="333" height="600" fill="#002868" opacity="0.95"/>

  <!-- White stripe -->
  <rect x="333" y="0" width="667" height="300" fill="#FFFFFF" opacity="0.40"/>

  <!-- Red stripe -->
  <rect x="333" y="300" width="667" height="300" fill="#BF0A30" opacity="0.45"/>

  <!-- Stripe divider -->
  <rect x="333" y="298" width="667" height="4" fill="#000" opacity="0.25"/>

  <!-- Texas lone star -->
  <polygon points="166,150 196,230 278,234 214,285 237,370 166,326 95,370 118,285 54,234 136,230"
           fill="#FFFFFF" opacity="0.7" filter="url(#glow)"/>

  <!-- HOUSTON NAVY BAR -->
  <rect x="0" y="390" width="1000" height="50" fill="#001a4d" opacity="0.85"/>

  <!-- Houston twin stars -->
  <polygon points="100,415 104,421 112,421 106,425 108,433 100,428 92,433 94,425 88,421 96,421"
           fill="#FFFFFF" opacity="0.7"/>
  <polygon points="900,415 904,421 912,421 906,425 908,433 900,428 892,433 894,425 888,421 896,421"
           fill="#FFFFFF" opacity="0.7"/>

  <!-- Center lone star (smaller) -->
  <polygon points="500,415 506,427 520,428 510,436 513,450 500,442 487,450 490,436 480,428 494,427"
           fill="#FFFFFF" opacity="0.6"/>

  <!-- SINISTER STATE text -->
  <text x="500" y="242" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="90" font-weight="bold" letter-spacing="22"
        fill="#FFFFFF" filter="url(#strongGlow)"
        opacity="0.95">SINISTER</text>

  <rect x="330" y="262" width="340" height="2" fill="#FFFFFF" opacity="0.4" filter="url(#glow)"/>

  <text x="500" y="306" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="normal" letter-spacing="28"
        fill="#FFFFFF" opacity="0.8" filter="url(#glow)">STATE</text>

  <!-- TEXAS ROLEPLAY in Houston bar -->
  <text x="500" y="426" text-anchor="middle"
        font-family="Georgia, serif" font-size="16" letter-spacing="12"
        fill="#FFFFFF" opacity="0.85">TEXAS ROLEPLAY</text>

  <!-- Bottom red bar -->
  <rect x="0" y="578" width="1000" height="22" fill="#BF0A30" opacity="0.45"/>

  <!-- Vignette overlay -->
  <rect width="1000" height="600" fill="url(#vignette)" opacity="0.7"/>
</svg>
