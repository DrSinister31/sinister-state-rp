<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Texas flag colors -->
    <!-- Blue: #002868  Red: #BF0A30  White: #FFFFFF -->
    <!-- Houston flag: Navy blue + white star -->
  </defs>

  <!-- Full-bleed Texas flag backdrop (muted/dark for cinema) -->
  <rect x="0" y="0" width="800" height="420" fill="#0d0c0a"/>

  <!-- Left blue bar (Texas flag style) -->
  <rect x="0" y="0" width="200" height="420" fill="#001a4d" opacity="0.7"/>

  <!-- White horizontal stripe -->
  <rect x="200" y="0" width="600" height="210" fill="#e8e0d5" opacity="0.12"/>

  <!-- Red horizontal stripe -->
  <rect x="200" y="210" width="600" height="210" fill="#7a051c" opacity="0.15"/>

  <!-- Texas lone star in blue canton -->
  <polygon points="100,100 118,150 170,152 128,185 142,235 100,200 58,235 72,185 30,152 82,150"
           fill="#ffffff" opacity="0.3" filter="url(#glow)"/>

  <!-- Houston lone star (smaller, lower) -->
  <polygon points="100,280 112,310 144,312 120,334 128,364 100,346 72,364 80,334 56,312 88,310"
           fill="#ffffff" opacity="0.2" filter="url(#glow)"/>

  <!-- ============ BRAND TEXT ============ -->

  <!-- SINISTER -->
  <text x="500" y="170" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="78" font-weight="bold" letter-spacing="20"
        fill="#e8e0d5" filter="url(#strongGlow)"
        opacity="0.9">SINISTER</text>

  <!-- Accent line -->
  <rect x="350" y="188" width="300" height="2"
        fill="#e8e0d5" opacity="0.4" filter="url(#glow)"/>

  <!-- STATE -->
  <text x="500" y="230" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="normal" letter-spacing="26"
        fill="#e8e0d5" opacity="0.6" filter="url(#glow)">STATE</text>

  <!-- TEXAS badge - Houston city flag inspired (navy + white star) -->
  <rect x="300" y="255" width="400" height="36" rx="3"
        fill="#001a4d" stroke="#e8e0d5" stroke-width="1"
        opacity="0.7" filter="url(#glow)"/>

  <!-- Houston-style lone star in badge -->
  <polygon points="340,273 344,279 350,279 346,283 348,289 340,285 332,289 334,283 330,279 336,279"
           fill="#e8e0d5" opacity="0.6"/>
  <polygon points="660,273 664,279 670,279 666,283 668,289 660,285 652,289 654,283 650,279 656,279"
           fill="#e8e0d5" opacity="0.6"/>

  <text x="500" y="281" text-anchor="middle"
        font-family="Georgia, serif" font-size="15" letter-spacing="10"
        fill="#e8e0d5" opacity="0.7" filter="url(#glow)">TEXAS ROLEPLAY</text>

  <!-- Bottom stripe -->
  <rect x="300" y="300" width="400" height="1"
        fill="#e8e0d5" opacity="0.15"/>

  <!-- Cities -->
  <text x="500" y="328" text-anchor="middle"
        font-family="Georgia, serif" font-size="10" letter-spacing="4"
        fill="rgba(232,224,213,0.25)" opacity="0.5">HOUSTON  &bull;  FORT WORTH  &bull;  KILLEEN</text>

  <!-- Bottom bar with Texas red -->
  <rect x="0" y="360" width="800" height="60" fill="none"/>
  <rect x="0" y="405" width="800" height="15" fill="#7a051c" opacity="0.15"/>

  <!-- Flag pin stripe accent -->
  <rect x="0" y="407" width="800" height="1" fill="#e8e0d5" opacity="0.08"/>
</svg>
